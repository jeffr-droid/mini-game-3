<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kleines Spiel</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ffc0cb 0%, #ffb6d9 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    #game {
      position: relative;
      width: 400px;
      height: 200px;
      background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 100%);
      border: 4px solid #333;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    #player {
      position: absolute;
      bottom: 10px;
      left: 20px;
      font-size: 28px;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: scaleX(-1);
    }

    #player::before {
      content: '🏃';
    }

    #player.jumping::before {
      content: '🤸';
      animation: jumpFlip 0.6s ease-in-out;
    }

    @keyframes jumpFlip {
      0% { transform: rotateZ(0deg); }
      50% { transform: rotateZ(360deg); }
      100% { transform: rotateZ(360deg); }
    }

    @keyframes playerJump {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    #player.jumping {
      animation: playerJump 0.6s ease-in-out;
    }

    #obstacle {
      position: absolute;
      bottom: 10px;
      right: -20px;
      width: 30px;
      height: 30px;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #obstacle::before {
      content: '🔴';
    }

    #message {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
      backdrop-filter: blur(5px);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    #letter {
      background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
      border: none;
      padding: 30px;
      font-size: 18px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      color: white;
      max-width: 320px;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    #letter p {
      margin: 10px 0;
      font-size: 20px;
    }

    #prize {
      position: absolute;
      bottom: 10px;
      right: -30px;
      font-size: 30px;
      display: none;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    button {
      margin-top: 20px;
      padding: 12px 30px;
      border: none;
      background: white;
      color: #ff1493;
      cursor: pointer;
      border-radius: 25px;
      font-weight: bold;
      font-size: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    input {
      font-size: 16px;
      padding: 12px 16px;
      border: 2px solid white;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      width: 100%;
      max-width: 250px;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #ff1493;
      background: white;
      box-shadow: 0 0 10px rgba(255, 20, 147, 0.4);
    }

    input::placeholder {
      color: #999;
    }
  </style>
</head>
<body>

<div id="game">
  <div id="player"></div>
  <div id="obstacle"></div>
  <div id="prize">🏆</div>
  <div id="message">
    <div id="letter">
      <p>🎉 Du hast gewonnen! 🎉</p>
      <p><strong>Kann ich deine E-Mail haben? &lt;3</strong></p>
      <form id="emailForm" action="https://formspree.io/f/mvzvbrld" method="POST">
        <input type="email" name="email" id="emailInput" placeholder="Deine E-Mail">
        <br>
        <button type="submit">Absenden</button>
      </form>
    </div>
  </div>
</div>

<script>
  const player = document.getElementById('player');
  const obstacle = document.getElementById('obstacle');
  const message = document.getElementById('message');
  const game = document.getElementById('game');
  const form = document.getElementById('emailForm');

  let isJumping = false;
  let position = 0;
  let obstacleX = 400;
  let score = 0;
  let prizeX = 400;

  function jump() {
    if (isJumping) return;
    isJumping = true;
    player.classList.add('jumping');

    let upInterval = setInterval(() => {
      if (position >= 100) {
        clearInterval(upInterval);

        let downInterval = setInterval(() => {
          if (position <= 0) {
            clearInterval(downInterval);
            isJumping = false;
            player.classList.remove('jumping');
          }
          position -= 5;
          player.style.bottom = position + 'px';
        }, 20);
      }
      position += 5;
      player.style.bottom = position + 'px';
    }, 20);
  }

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      jump();
    }
  });

  game.addEventListener('touchstart', (e) => {
    if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') {
    e.preventDefault();
    jump();
    }
  });

  function moveObstacle() {
    obstacleX -= 5;
    if (obstacleX < -20) {
      obstacleX = 400;
      score++;

      if (score >= 3) {
        winGame();
      }
    }
    obstacle.style.right = (400 - obstacleX) + 'px';

    // collision
    if (obstacleX < 60 && obstacleX > 20 && position < 20) {
      alert('Game Over 😅');
      location.reload();
    }
  }

  let gameInterval = setInterval(moveObstacle, 30);

  function winGame() {
    clearInterval(gameInterval);
    const prize = document.getElementById('prize');
    prize.style.display = 'block';
    let prizeInterval = setInterval(() => movePrize(prizeInterval), 30);
  }

  function movePrize(interval) {
    prizeX -= 5;
    const prize = document.getElementById('prize');
    prize.style.right = (400 - prizeX) + 'px';
    // collision with prize to win
    if (prizeX < 60 && prizeX > 20 && position < 30) {
      clearInterval(interval);
      message.style.display = 'flex';
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('emailInput').value;
    if (!email) {
      alert('Bitte gib eine E-Mail ein 😊');
      return;
    }
    try {
      const response = await fetch('https://formspree.io/f/mvzvbrld', {
        method: 'POST',
        body: new FormData(form),
        headers: {
          'Accept': 'application/json'
        }
      });
      if (response.ok) {
        alert('Danke 😌');
      } else {
        alert('Fehler beim Senden. Versuche es später.');
      }
    } catch (error) {
      alert('Fehler beim Senden. Versuche es später.');
    }
  });
</script>

</body>
</html>
